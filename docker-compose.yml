services:
  mongodb:
    image: mongo:7
    container_name: person-crud-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: username
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: person_crud
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: person-crud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongodb_data: